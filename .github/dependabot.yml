version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: America/Chicago
    open-pull-requests-limit: 5
    labels:
      - dependencies
    groups:
      npm-minor-and-patch:
        update-types:
          - minor
          - patch
    ignore:
      # Next.js and React are coordinated upgrades — keep them as
      # standalone PRs so we can read the migration notes per bump.
      - dependency-name: next
        update-types: [version-update:semver-major]
      - dependency-name: react
        update-types: [version-update:semver-major]
      - dependency-name: react-dom
        update-types: [version-update:semver-major]
      # eslint 10 is incompatible with eslint-plugin-react bundled via
      # eslint-config-next (peer requires eslint ≤ 9.x). Unpin once
      # eslint-config-next ships support for eslint 10.
      - dependency-name: eslint
        update-types: [version-update:semver-major]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: America/Chicago
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
    groups:
      actions-all:
        patterns:
          - "*"
